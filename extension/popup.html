<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #F7F5F2; /* Limestone */
      color: #1A1C1E; /* Deep Ink */
      margin: 0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      margin: 0;
    }
    .status-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #FFFFFF;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #6C7278; /* Slate */
      margin-bottom: 12px;
    }
    .status-text {
      font-size: 12px;
      font-weight: 500;
    }
    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #6C7278; /* Disconnected */
      display: inline-block;
      margin-right: 6px;
    }
    .status-indicator.connected {
      background-color: #4CAF50; /* Connected Green */
    }
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .switch-label {
      font-size: 12px;
      font-weight: 600;
    }
    /* Switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 22px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #B8422E; /* Boston Clay Accent */
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }
    .footer {
      font-size: 10px;
      color: #6C7278;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">Antigravity Bridge</h1>
  </div>
  
  <div class="status-container">
    <span class="status-text">Local Server:</span>
    <div>
      <span id="indicator" class="status-indicator"></span>
      <span id="status" style="font-size: 12px; font-weight: bold; color: #6C7278;">OFF</span>
    </div>
  </div>

  <div class="switch-container">
    <span class="switch-label">Quyền truy cập AI</span>
    <label class="switch">
      <input type="checkbox" id="toggle-connection">
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
    Antigravity Browser Bridge v1.0.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
